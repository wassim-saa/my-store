<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxury Car Fleet - Exterior & Interior</title>
<style>
:root { --gold: #f1c40f; --dark: #0b0b0b; }
body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: white; margin: 0; }
.container { max-width: 1200px; margin: auto; padding: 20px; }
.car-card { background: #1a1a1a; border-radius: 20px; margin-bottom: 40px; overflow: hidden; border: 1px solid #333; }
.image-gallery { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; padding: 15px; }
.main-img { width: 100%; height: 400px; object-fit: cover; border-radius: 10px; }
.side-images { display: flex; flex-direction: column; gap: 10px; }
.side-img { width: 100%; height: 195px; object-fit: cover; border-radius: 10px; transition: 0.3s; }
.side-img:hover { transform: scale(1.02); filter: brightness(1.2); }

.info-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: #222; }
.specs-tags span { background: #333; padding: 5px 15px; border-radius: 20px; margin-right: 10px; font-size: 0.8em; color: var(--gold); }
#order-section { background: var(--gold); color: black; padding: 40px; border-radius: 20px; display: none; margin-top: 20px; }
input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
.btn-order { background: var(--gold); color: black; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
</style>
</head>
<body>

<div class="container">
<h1 style="text-align:center; color:var(--gold); font-size: 3em; margin: 40px 0;">Premium Selection</h1>

<div class="car-card">
<div class="image-gallery">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800" class="main-img" alt="Exterior">
<div class="side-images">
<img src="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?w=400" class="side-img" alt="Interior">
<img src="https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400" class="side-img" alt="Details">
</div>
</div>
<div class="info-bar">
<div>
<h2>Porsche 911 Turbo S</h2>
<div class="specs-tags">
<span>Exterior: Night Blue</span>
<span>Interior: Leather Black</span>
<span>640 HP</span>
</div>
</div>
<div style="text-align:right">
<div style="font-size: 1.5em; font-weight: bold; color: #2ecc71;">45,000 DZD / Day</div>
<button class="btn-order" onclick="openOrder('Porsche 911 Turbo S')">Book & Deliver</button>
</div>
</div>
</div>

<div class="car-card">
<div class="image-gallery">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800" class="main-img" alt="Exterior">
<div class="side-images">
<img src="https://images.unsplash.com/photo-1617814071742-132049e3778a?w=400" class="side-img" alt="Interior">
<img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?w=400" class="side-img" alt="Wheel">
</div>
</div>
<div class="info-bar">
<div>
<h2>BMW 5 Series M-Package</h2>
<div class="specs-tags">
<span>Interior: White Ambient</span>
<span>Sunroof</span>
<span>Executive Class</span>
</div>
</div>
<div style="text-align:right">
<div style="font-size: 1.5em; font-weight: bold; color: #2ecc71;">25,000 DZD / Day</div>
<button class="btn-order" onclick="openOrder('BMW 5 Series')">Book & Deliver</button>
</div>
</div>
</div>

<div id="order-section">
<h2 id="carTitle">Booking Details</h2>
<form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
<input type="hidden" name="Car" id="carInput">
<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
<div>
<label>Full Name</label>
<input type="text" name="Name" required placeholder="Wassim Saadi">
<label>Phone Number</label>
<input type="tel" name="Phone" required placeholder="06XXXXXXXX">
</div>
<div>
<label>Home Delivery Address (عين ولمان / سطيف)</label>
<textarea name="Address" rows="4" required placeholder="Enter exact street and house number"></textarea>
</div>
</div>
<button type="submit" style="background:black; color:white; width:100%; padding:20px; font-size:1.2em; border-radius:10px; cursor:pointer;">Confirm Order Now</button>
</form>
</div>
</div>

<script>
function openOrder(carName) {
document.getElementById('order-section').style.display = 'block';
document.getElementById('carTitle').innerText = "Booking: " + carName;
document.getElementById('carInput').value = carName;
window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>

</body>
</html>
